name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quoin
          POSTGRES_PASSWORD: quoin
          POSTGRES_DB: quoin_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    env:
      DATABASE_URL: postgresql://quoin:quoin@localhost:5432/quoin_test
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_test_placeholder
      SUPABASE_SERVICE_ROLE_KEY: sb_service_role_test_placeholder
      ESPM_CREDENTIAL_MASTER_KEY: enterprise-readiness-test-key
      GREEN_BUTTON_TOKEN_MASTER_KEY: enterprise-readiness-green-button-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate platform contract
        run: node scripts/validate-platform-contract.mjs

      - name: Validate fresh Prisma db
        run: npm run db:validate:fresh

      - name: TypeScript check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Run DB-backed integration tests
        run: npm run test:integration:db

      - name: Build app
        run: npm run build

      - name: Run evals
        run: npm run eval
