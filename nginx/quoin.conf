server {
    listen 80;
    server_name staging.quoin.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.quoin.dev;

    ssl_certificate /etc/letsencrypt/live/staging.quoin.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.quoin.dev/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Next.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Upload size limit (for CSV uploads)
    client_max_body_size 10M;
}
