services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quoin
      POSTGRES_PASSWORD: quoin_dev
      POSTGRES_DB: quoin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
